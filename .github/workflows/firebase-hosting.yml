name: Deploy to Firebase Hosting on merge

on:
  push:
    branches: [ main ]     # deploy on merges/pushes to main
  workflow_dispatch: {}     # allows the "Run workflow" button

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@latest

      - name: Install Firebase Functions dependencies
        run: npm install --prefix functions

      - name: Check Firebase auth & project access
        run: |
          firebase --version
          cd "$GITHUB_WORKSPACE"
          ls -la
          echo "---- projects:list ----"
          firebase projects:list --project first-grade-news-hub
          echo "---- show firebase.json ----"
          cat firebase.json
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Configure Firebase Functions environment
        run: |
          cd "$GITHUB_WORKSPACE"
          env_file="functions/.env"
          rm -f "$env_file"
          touch "$env_file"

          if [ -n "$TEACHER_NOTIFICATION_EMAILS" ]; then
            printf 'TEACHER_NOTIFICATION_EMAILS=%s\n' "$TEACHER_NOTIFICATION_EMAILS" >> "$env_file"
          fi

          if [ -n "$TEACHER_NOTIFICATION_SMS_EMAILS" ]; then
            printf 'TEACHER_NOTIFICATION_SMS_EMAILS=%s\n' "$TEACHER_NOTIFICATION_SMS_EMAILS" >> "$env_file"
          fi

          if [ -n "$ENABLE_EMAIL_TO_SMS_GATEWAYS" ]; then
            printf 'ENABLE_EMAIL_TO_SMS_GATEWAYS=%s\n' "$ENABLE_EMAIL_TO_SMS_GATEWAYS" >> "$env_file"
          fi

          if [ -n "$TEACHER_NOTIFICATION_PHONE_NUMBERS" ]; then
            printf 'TEACHER_NOTIFICATION_PHONE_NUMBERS=%s\n' "$TEACHER_NOTIFICATION_PHONE_NUMBERS" >> "$env_file"
          fi

          if [ -n "$TWILIO_ACCOUNT_SID" ]; then
            printf 'TWILIO_ACCOUNT_SID=%s\n' "$TWILIO_ACCOUNT_SID" >> "$env_file"
          fi

          if [ -n "$TWILIO_AUTH_TOKEN" ]; then
            printf 'TWILIO_AUTH_TOKEN=%s\n' "$TWILIO_AUTH_TOKEN" >> "$env_file"
          fi

          if [ -n "$TWILIO_FROM_NUMBER" ]; then
            printf 'TWILIO_FROM_NUMBER=%s\n' "$TWILIO_FROM_NUMBER" >> "$env_file"
          fi

          if [ ! -s "$env_file" ]; then
            rm -f "$env_file"
          fi
        env:
          TEACHER_NOTIFICATION_EMAILS: ${{ secrets.TEACHER_NOTIFICATION_EMAILS }}
          TEACHER_NOTIFICATION_SMS_EMAILS: ${{ secrets.TEACHER_NOTIFICATION_SMS_EMAILS }}
          ENABLE_EMAIL_TO_SMS_GATEWAYS: ${{ secrets.ENABLE_EMAIL_TO_SMS_GATEWAYS }}
          TEACHER_NOTIFICATION_PHONE_NUMBERS: ${{ secrets.TEACHER_NOTIFICATION_PHONE_NUMBERS }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM_NUMBER: ${{ secrets.TWILIO_FROM_NUMBER }}

      - name: Deploy to Firebase Hosting, Functions, and Firestore Rules
        run: |
          cd "$GITHUB_WORKSPACE"
          firebase deploy \
            --only hosting,functions,firestore:rules \
            --project first-grade-news-hub \
            --non-interactive \
            --force \
            --debug
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
